name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: mysql://root:rootpassword@localhost:3306/convention_db_test
  NUXT_SESSION_PASSWORD: test_session_password_32_chars_min
  NUXT_PUBLIC_SITE_URL: http://localhost:3000
  # Désactiver les emails en test
  SEND_EMAILS: false
  # Bypass reCAPTCHA en test
  NUXT_RECAPTCHA_DEV_BYPASS: true
  # Force les actions GitHub (checkout, cache, setup-node, upload-artifact)
  # à utiliser le runtime Node 24 (au lieu de Node 20 déprécié)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Monorepo : les commandes `run:` s'exécutent dans apps/app1. Les chemins des actions
# (`uses:` cache/upload, hashFiles) restent relatifs à la racine → préfixés apps/app1/.
defaults:
  run:
    working-directory: apps/app1

jobs:
  # Job pour installer les dépendances une seule fois
  setup:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      deps-cache-key: ${{ steps.cache-keys.outputs.deps }}
      prisma-cache-key: ${{ steps.cache-keys.outputs.prisma }}
      nuxt-cache-key: ${{ steps.cache-keys.outputs.nuxt }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'apps/app1/package-lock.json'

      - name: Generate cache keys
        id: cache-keys
        run: |
          echo "deps=${{ runner.os }}-deps-${{ hashFiles('apps/app1/package-lock.json') }}" >> $GITHUB_OUTPUT
          echo "prisma=${{ runner.os }}-prisma-${{ hashFiles('apps/app1/prisma/schema/**', 'apps/app1/prisma.config.ts') }}-${{ hashFiles('apps/app1/package-lock.json') }}" >> $GITHUB_OUTPUT
          echo "nuxt=${{ runner.os }}-nuxt-${{ hashFiles('apps/app1/nuxt.config.ts', 'apps/app1/tsconfig.json', 'apps/app1/app.config.ts') }}" >> $GITHUB_OUTPUT

      - name: Cache Node dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            apps/app1/node_modules
            ~/.npm
          key: ${{ steps.cache-keys.outputs.deps }}
          # Pas de restore-keys pour éviter les caches incompatibles avec le lockfile

      - name: Cache Prisma client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: apps/app1/server/generated/prisma
          key: ${{ steps.cache-keys.outputs.prisma }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Cache Nuxt build
        id: cache-nuxt
        uses: actions/cache@v4
        with:
          path: apps/app1/.nuxt
          key: ${{ steps.cache-keys.outputs.nuxt }}
          restore-keys: |
            ${{ runner.os }}-nuxt-

      - name: Install dependencies (if not cached)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: Generate Prisma client
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      # Générer les fichiers Nuxt nécessaires pour les tests (si pas en cache)
      - name: Prepare Nuxt
        if: steps.cache-nuxt.outputs.cache-hit != 'true'
        run: npx nuxi prepare

      # Sauvegarder les dépendances comme artifact pour les autres jobs
      - name: Upload dependencies
        uses: actions/upload-artifact@v4
        with:
          name: deps-${{ github.run_id }}
          path: |
            apps/app1/node_modules
            apps/app1/.nuxt
            apps/app1/package.json
            apps/app1/package-lock.json
          retention-days: 1

  # Job pour le linting (rapide, pas besoin de DB)
  lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'apps/app1/package-lock.json'

      - name: Restore Node dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/app1/node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.deps-cache-key }}
          fail-on-cache-miss: true

      - name: Restore Prisma client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: apps/app1/server/generated/prisma
          key: ${{ needs.setup.outputs.prisma-cache-key }}

      - name: Generate Prisma Client (if cache miss)
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Restore Nuxt build
        id: cache-nuxt
        uses: actions/cache@v4
        with:
          path: apps/app1/.nuxt
          key: ${{ needs.setup.outputs.nuxt-cache-key }}

      # Régénère .nuxt si le cache manque (clé nuxt-cache-key change quand nuxt.config.ts change ;
      # le restore est alors parfois indisponible — on ne fait donc pas fail-on-cache-miss ici).
      - name: Prepare Nuxt (if cache miss)
        if: steps.cache-nuxt.outputs.cache-hit != 'true'
        run: npx nuxi prepare

      - name: Run linting
        run: npm run lint

  # Job de vérification de types (vue-tsc) : attrape les variables/références non définies que
  # le build (esbuild, sans typecheck) et ESLint ne voient pas — ex. `edition is not defined`.
  typecheck:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'apps/app1/package-lock.json'

      - name: Restore Node dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/app1/node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.deps-cache-key }}
          fail-on-cache-miss: true

      - name: Restore Prisma client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: apps/app1/server/generated/prisma
          key: ${{ needs.setup.outputs.prisma-cache-key }}

      - name: Generate Prisma Client (if cache miss)
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Restore Nuxt build
        id: cache-nuxt
        uses: actions/cache@v4
        with:
          path: apps/app1/.nuxt
          key: ${{ needs.setup.outputs.nuxt-cache-key }}

      - name: Prepare Nuxt (if cache miss)
        if: steps.cache-nuxt.outputs.cache-hit != 'true'
        run: npx nuxi prepare

      # On ne gate que sur les "Cannot find name" (TS2304/TS2552) — la classe des bugs
      # `edition is not defined` (variable/import manquant). Le typecheck complet remonte beaucoup
      # d'erreurs de types pré-existantes (correction de types) qu'on ne traite pas ici ; on les
      # ignore volontairement pour que ce gate reste actionnable.
      - name: Typecheck — échoue sur les noms non définis (TS2304/TS2552)
        run: |
          npm run typecheck > typecheck.log 2>&1 || true
          if grep -qE "error TS(2304|2552)" typecheck.log; then
            echo "::error::Référence(s) à des noms non définis détectée(s) :"
            grep -E "error TS(2304|2552)" typecheck.log || true
            exit 1
          fi
          echo "✅ Aucune référence non définie (TS2304/TS2552)."

  # Job pour valider que le build fonctionne
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'apps/app1/package-lock.json'

      - name: Restore Node dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/app1/node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.deps-cache-key }}
          fail-on-cache-miss: true

      - name: Restore Prisma client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: apps/app1/server/generated/prisma
          key: ${{ needs.setup.outputs.prisma-cache-key }}

      - name: Generate Prisma Client
        # Toujours régénérer pour éviter les incohérences avec le cache des node_modules
        run: npx prisma generate

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            apps/app1/.nuxt/
            apps/app1/.output/
          retention-days: 7

  # Tests en parallèle avec matrice
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [setup, lint, build] # Attendre setup, lint et build avant de lancer les tests

    strategy:
      fail-fast: false # Continue même si un test échoue
      matrix:
        test-group:
          - { name: 'unit', cmd: 'npm run test:unit:run', db: false }
          - { name: 'nuxt', cmd: 'npm run test:nuxt:run', db: false }
          - { name: 'e2e', cmd: 'npm run test:e2e:run', db: false }
          - { name: 'database', cmd: 'npm run test:db:run', db: true }

    services:
      mysql:
        image: ${{ matrix.test-group.db && 'mysql:8.0' || '' }}
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: convention_db_test
          MYSQL_USER: convention_user
          MYSQL_PASSWORD: convention_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'apps/app1/package-lock.json'

      - name: Restore Node dependencies
        uses: actions/cache@v4
        with:
          path: |
            apps/app1/node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.deps-cache-key }}
          fail-on-cache-miss: true

      - name: Restore Prisma client
        id: cache-prisma
        uses: actions/cache@v4
        with:
          path: apps/app1/server/generated/prisma
          key: ${{ needs.setup.outputs.prisma-cache-key }}

      - name: Generate Prisma Client (if cache miss)
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: npx prisma generate

      - name: Restore Nuxt build
        id: cache-nuxt
        uses: actions/cache@v4
        with:
          path: apps/app1/.nuxt
          key: ${{ needs.setup.outputs.nuxt-cache-key }}

      - name: Prepare Nuxt (if cache miss)
        if: steps.cache-nuxt.outputs.cache-hit != 'true'
        run: npx nuxi prepare

      - name: Setup database schema (DB tests only)
        if: matrix.test-group.db
        run: |
          # Reset la base complètement pour éviter les conflits de migration
          # Note: prisma/seed.ts est vide, donc pas de données de seed à charger
          npx prisma migrate reset --force

      - name: Run tests - ${{ matrix.test-group.name }}
        run: ${{ matrix.test-group.cmd }}

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-group.name }}-${{ github.run_id }}
          path: |
            apps/app1/test-results/
            apps/app1/coverage/
            apps/app1/.nuxt/
          retention-days: 7

      - name: Upload coverage reports
        if: always() && (matrix.test-group.name == 'unit' || matrix.test-group.name == 'database')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ matrix.test-group.name }}-${{ github.run_id }}
          path: apps/app1/coverage/
          retention-days: 30
