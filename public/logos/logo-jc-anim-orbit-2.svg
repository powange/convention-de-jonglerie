<svg xmlns="http://www.w3.org/2000/svg"
     width="727" height="727" viewBox="-1000 -1000 9270 9270"
     style="max-height: 504.64px;">

  <style>
    /* =============================================
       THEME
       ============================================= */
    :root { --logo-white-color: #000000; }
    @media (prefers-color-scheme: dark) { :root { --logo-white-color: #ffffff; } }
    .dark { --logo-white-color: #ffffff; }

    /* =============================================
       ANIMATION TIMELINE — Total: 10s
       Phase 1 — Cascade:          0% - 33%   (0s - 3.3s)
       Phase 2 — Transition:       33% - 50%  (3.3s - 5s)
       Phase 3 — Morph C + Reveal: 50% - 80%  (5s - 8s)
       Phase 4 — Settle:           80% - 100% (8s - 10s)
       =============================================

       Cascade: figure-8 pattern (codepen technique)
       All balls at center (3635, 3500), animated via translate
       1 cycle = 33.33%, 8 steps of 4.17%

       Figure-8 positions (translate from center):
         center     = (0, 0)
         right-up   = (600, -1400)
         right-hand = (1200, 0)
         right-down = (600, 1400)
         left-up    = (-600, -1400)
         left-hand  = (-1200, 0)
         left-down  = (-600, 1400)

       Ball A: starts at 0% of cycle (center)
       Ball B: starts at 33% of cycle (right-down → center)
       Ball C: starts at 66% of cycle (left-up → left-hand)
    */

    /* =============================================
       BALL A — Red → grows into C
       Starts at center (0% of cycle)
       Ends at C center: translate(1178, 0)
       ============================================= */
    @keyframes ball-a {
      /* Cascade cycle */
      0%      { transform: translate(0px, 0px); }
      4.17%   { transform: translate(600px, -1400px) scale(1.05); }
      8.33%   { transform: translate(1200px, 0px); animation-timing-function: ease-out; }
      12.5%   { transform: translate(600px, 1400px); }
      16.67%  { transform: translate(0px, 0px); }
      20.83%  { transform: translate(-600px, -1400px) scale(1.05); animation-timing-function: ease-in; }
      25%     { transform: translate(-1200px, 0px); animation-timing-function: ease-out; }
      29.17%  { transform: translate(-600px, 1400px); }
      33.33%  { transform: translate(0px, 0px); animation-timing-function: ease-in-out; }
      /* Transition to C center + grow simultaneously */
      55%     { transform: translate(1178px, 0px); }
      100%    { transform: translate(1178px, 0px); }
    }
    @keyframes ball-a-r {
      0%, 33.33%  { r: 350; }
      55%         { r: 1900; }
      100%        { r: 1900; }
    }

    .ball-a {
      animation:
        ball-a 7s linear forwards,
        ball-a-r 7s ease-in-out forwards,
        ball-a-opacity 7s linear forwards;
    }

    /* =============================================
       BALL B — Red → Red Orbit
       Starts at 33% of cycle (right-down position)
       Ends at orbit: translate(1291, 2809)
       ============================================= */
    @keyframes ball-b {
      /* Cascade: offset 1/3 cycle (start at right-down) */
      0%      { transform: translate(600px, 1400px); }
      4.17%   { transform: translate(0px, 0px); }
      8.33%   { transform: translate(-600px, -1400px) scale(1.05); animation-timing-function: ease-in; }
      12.5%   { transform: translate(-1200px, 0px); animation-timing-function: ease-out; }
      16.67%  { transform: translate(-600px, 1400px); }
      20.83%  { transform: translate(0px, 0px); }
      25%     { transform: translate(600px, -1400px) scale(1.05); }
      29.17%  { transform: translate(1200px, 0px); animation-timing-function: ease-out; }
      33.33%  { transform: translate(600px, 1400px); animation-timing-function: ease-in-out; }
      /* Transition to orbit */
      55%     { transform: translate(1291px, 2809px); }
      100%    { transform: translate(1291px, 2809px); }
    }
    @keyframes ball-b-r {
      0%, 33.33%  { r: 350; }
      55%         { r: 713; }
      100%        { r: 713; }
    }
    .ball-b {
      animation:
        ball-b 7s linear forwards,
        ball-b-r 7s ease-in-out forwards;
    }

    /* =============================================
       BALL C — White → White Orbit
       Starts at 66% of cycle (left-up position)
       Ends at orbit: translate(-1637, -2500)
       ============================================= */
    @keyframes ball-c {
      /* Cascade: offset 2/3 cycle (start at left-up) */
      0%      { transform: translate(-600px, -1400px) scale(1.05); animation-timing-function: ease-in; }
      4.17%   { transform: translate(-1200px, 0px); animation-timing-function: ease-out; }
      8.33%   { transform: translate(-600px, 1400px); }
      12.5%   { transform: translate(0px, 0px); }
      16.67%  { transform: translate(600px, -1400px) scale(1.05); }
      20.83%  { transform: translate(1200px, 0px); animation-timing-function: ease-out; }
      25%     { transform: translate(600px, 1400px); }
      29.17%  { transform: translate(0px, 0px); }
      33.33%  { transform: translate(-600px, -1400px); animation-timing-function: ease-in-out; }
      /* Transition to orbit */
      55%     { transform: translate(-1637px, -2500px); }
      100%    { transform: translate(-1637px, -2500px); }
    }
    @keyframes ball-c-r {
      0%, 33.33%  { r: 350; }
      55%         { r: 731; }
      100%        { r: 731; }
    }
    .ball-c {
      animation:
        ball-c 7s linear forwards,
        ball-c-r 7s ease-in-out forwards;
    }

    /* =============================================
       C FINAL — Full C shape (circle + mask) replaces ball-a
       Appears when ball-a reaches full size
       ============================================= */
    .c-final {
      opacity: 0;
      animation: c-final-appear 7s linear forwards;
    }
    @keyframes c-final-appear {
      0%, 54.99%  { opacity: 0; }
      55%         { opacity: 1; }
      100%        { opacity: 1; }
    }

    /* ball-a fades out progressively en meme temps que c-final apparait */
    @keyframes ball-a-opacity {
      0%, 55%   { opacity: 1; }
      65%       { opacity: 0; }
      100%      { opacity: 0; }
    }

    /* =============================================
       LOGO WHITE PATHS — Fade in after morph starts
       ============================================= */
    .logo-white-fill {
      opacity: 0;
      animation: fill-in 7s linear forwards;
    }
    @keyframes fill-in {
      0%, 55%   { opacity: 0; }
      65%       { opacity: 1; }
      100%      { opacity: 1; }
    }

    /* Ball B et C restent visibles a leur position finale */
  </style>

  <defs>
    <!-- Masque pour transformer ball-a en C -->
    <mask id="c-mask">
      <rect width="100%" height="100%" fill="white" />
      <!-- Cercle intérieur + triangle d'ouverture fusionnés en un seul path -->
      <!-- Cercle interieur -->
      <circle cx="4813" cy="3500" r="1100" fill="black" />
      <!-- Triangle d'ouverture (elargi pour couvrir toute la zone) -->
      <polygon points="4813,3500 6900,2500 6900,4500" fill="black" />
    </mask>

    <!-- Clip identique a logo-jc-2.svg -->
    <clipPath id="chevron-clip">
      <path d="M0,0 H7270 V7270 H0 Z M4813,1490 A2010,2010 0 1,1 4812,1490 Z" clip-rule="evenodd" />
    </clipPath>
  </defs>

  <!-- ====================================================
       LAYER 1: C FINAL — Apparait derriere ball-a
       ==================================================== -->
  <circle class="c-final" cx="4813" cy="3500" r="1900" fill="rgb(221,46,33)" mask="url(#c-mask)" />

  <!-- ====================================================
       LAYER 2: CASCADE BALLS (par-dessus le C final)
       All at cascade center (3635, 3500), moved via translate
       ==================================================== -->
  <circle class="ball-a" cx="3635" cy="3500" r="350" fill="rgb(221,46,33)" />
  <circle class="ball-b" cx="3635" cy="3500" r="350" fill="rgb(221,46,33)" />
  <circle class="ball-c" cx="3635" cy="3500" r="350" fill="var(--logo-white-color)" />

  <!-- ====================================================
       LAYER 3: LOGO WHITE — Fade in
       ==================================================== -->
  <g class="logo-white-fill" fill="var(--logo-white-color)">
    <!-- Chevron -->
    <path d="M 1460 5932 l 0 -412 43 6 c 60 9 298 -13 414 -36 246 -51 512 -167 728 -319 192 -135 400 -345 533 -539 l 50 -73 56 75 c 110 149 269 307 409 406 37 27 63 51 57 55 -6 3 -22 29 -36 57 -53 105 -330 407 -519 566 -107 90 -298 217 -450 300 -344 187 -729 292 -1167 318 l -118 7 0 -411 z" clip-path="url(#chevron-clip)" />
    <!-- Corps du J -->
    <path d="M 1350 5089 c -185 -18 -396 -94 -522 -187 -29 -21 -82 -70 -118 -109 -186 -199 -280 -498 -280 -893 l 0 -130 375 0 375 0 0 133 c 1 278 56 418 190 480 36 17 65 21 146 21 89 0 107 -3 157 -27 91 -45 134 -111 163 -248 12 -60 15 -226 16 -1020 l 1 -949 382 0 382 0 -3 943 c -1 642 -6 969 -14 1027 -68 501 -262 771 -648 900 -148 49 -425 76 -602 59 z" />
  </g>


</svg>
