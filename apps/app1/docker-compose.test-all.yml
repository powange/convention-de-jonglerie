# Docker Compose pour lancer tous les tests en développement
name: convention-de-jonglerie
services:
  # Base de données MySQL pour les tests
  test-db:
    image: mysql:8.0
    container_name: convention-test-db
    environment:
      MYSQL_ROOT_PASSWORD: test_root_password
      MYSQL_DATABASE: test_convention_db
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - '3308:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 5s
      retries: 30
    networks:
      - test-network

  # Container pour exécuter tous les tests
  test-runner:
    build:
      context: ../..
      dockerfile: apps/app1/Dockerfile.test
      args:
        BASE_NODE_IMAGE: ${BASE_NODE_IMAGE-node:24-slim}
    container_name: convention-test-runner
    environment:
      # Configuration de la base de données pour les tests
      DATABASE_URL: 'mysql://test_user:test_password@test-db:3306/test_convention_db'
      TEST_DATABASE_URL: 'mysql://test_user:test_password@test-db:3306/test_convention_db'
      # Configuration Nuxt
      NUXT_HOST: '0.0.0.0'
      NUXT_PORT: '3000'
      NODE_ENV: 'test'
      # Configuration des tests
      TEST_WITH_DB: 'true'
      CI: 'true'
      # Désactiver l'envoi d'emails en test
      SEND_EMAILS: 'false'
      # Mot de passe de session requis par nuxt-auth-utils
      NUXT_SESSION_PASSWORD: 'test_session_password_please_change_1234567890123456'
    volumes:
      # Monter le code source pour le hot-reload en dev
      - ./app:/app/apps/app1/app:cached
      - ../../layers:/app/layers:cached
      - ./server:/app/apps/app1/server:cached
      - ./shared:/app/apps/app1/shared:cached
      - ./test:/app/apps/app1/test:cached
      - ./scripts:/app/apps/app1/scripts:cached
      - ./prisma:/app/apps/app1/prisma:cached
      - ./public:/app/apps/app1/public:cached
      - ./nuxt.config.ts:/app/apps/app1/nuxt.config.ts:cached
      - ./vitest.config.ts:/app/apps/app1/vitest.config.ts:cached
      # Volumes pour les caches et dépendances
      - node_modules:/app/apps/app1/node_modules
      - nuxt_cache:/app/apps/app1/.nuxt
      - output_cache:/app/apps/app1/.output
    depends_on:
      test-db:
        condition: service_healthy
    networks:
      - test-network
    stdin_open: true
    tty: true
    command: sh /app/apps/app1/scripts/run-all-tests.sh

  # Container optionnel pour lancer les tests avec UI
  test-ui:
    build:
      context: ../..
      dockerfile: apps/app1/Dockerfile.test
      args:
        BASE_NODE_IMAGE: ${BASE_NODE_IMAGE-node:24-slim}
    container_name: convention-test-ui
    environment:
      DATABASE_URL: 'mysql://test_user:test_password@test-db:3306/test_convention_db'
      TEST_DATABASE_URL: 'mysql://test_user:test_password@test-db:3306/test_convention_db'
      NUXT_HOST: '0.0.0.0'
      NUXT_PORT: '3000'
      NODE_ENV: 'test'
      TEST_WITH_DB: 'true'
      SEND_EMAILS: 'false'
      NUXT_SESSION_PASSWORD: 'test_session_password_please_change_1234567890123456'
    volumes:
      - ./app:/app/apps/app1/app:cached
      - ../../layers:/app/layers:cached
      - ./server:/app/apps/app1/server:cached
      - ./shared:/app/apps/app1/shared:cached
      - ./test:/app/apps/app1/test:cached
      - ./scripts:/app/apps/app1/scripts:cached
      - ./prisma:/app/apps/app1/prisma:cached
      - ./public:/app/apps/app1/public:cached
      - ./nuxt.config.ts:/app/apps/app1/nuxt.config.ts:cached
      - ./vitest.config.ts:/app/apps/app1/vitest.config.ts:cached
      - node_modules:/app/apps/app1/node_modules
      - nuxt_cache:/app/apps/app1/.nuxt
      - output_cache:/app/apps/app1/.output
    ports:
      - '5173:5173' # Port pour Vitest UI
    depends_on:
      test-db:
        condition: service_healthy
    networks:
      - test-network
    stdin_open: true
    tty: true
    profiles:
      - ui
    command:
      - sh
      - -c
      - |
        sleep 5
        mkdir -p /app/apps/app1/public/uploads
        npx prisma migrate deploy >/dev/null 2>&1 || true
        npx prisma generate >/dev/null 2>&1

volumes:
  node_modules:
    driver: local
  nuxt_cache:
    driver: local
  output_cache:
    driver: local

networks:
  test-network:
    driver: bridge
