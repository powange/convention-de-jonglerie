# 2ᵉ app — lancement autonome en mode démo (cible dev, base SQLite).
#
# Usage (depuis apps/app2/) :
#   docker compose up --build -d
#   docker compose exec app2 npx prisma migrate dev --name init   # une seule fois (crée le schéma)
#   → http://localhost:3001
#
# La cible `runtime` du Dockerfile (image prod slim) est prévue pour MySQL, pas pour SQLite :
# elle ne contient pas le CLI Prisma et ne peut donc pas appliquer le schéma. On utilise `dev` ici.
services:
  app2:
    image: app2:dev
    container_name: app2
    build:
      context: .
      target: dev
    ports:
      - '3001:3000' # hôte 3001 → conteneur 3000 (évite le clash avec l'app principale sur 3000)
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: '3000'
      # Base SQLite persistée dans le volume (hors du code, survit aux rebuilds)
      DATABASE_URL: file:/data/app2.db
      # Secret de session, lu depuis apps/app2/.env par Docker Compose
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:?Definir NUXT_SESSION_PASSWORD dans apps/app2/.env (>= 32 caracteres)}
    volumes:
      - app2_db:/data
    restart: unless-stopped

volumes:
  app2_db:

# Réseau du reverse proxy (auto-signé https://dev.event.powange.com).
# Le proxy atteint le conteneur par son nom `app2` sur le port 3000.
# Si ton proxy vise plutôt l'hôte (localhost:3001), supprime ce bloc.
networks:
  default:
    external: true
    name: proxy-network
